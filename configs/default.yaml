daemon:
  socket_path: ~/.local/share/crabwise/crabwise.sock
  db_path: ~/.local/share/crabwise/crabwise.db
  raw_payload_dir: ~/.local/share/crabwise/raw/
  log_level: info
  pid_file: ~/.local/share/crabwise/crabwise.pid

discovery:
  scan_interval: 10s
  process_signatures:
    - claude
    - codex
  log_paths:
    - ~/.claude/projects/
    - ~/.codex/sessions/

adapters:
  log_watcher:
    enabled: true
    poll_fallback_interval: 30s
  proxy:
    enabled: false
    listen: 127.0.0.1:9119
    default_provider: openai
    upstream_timeout: 30s
    stream_idle_timeout: 120s
    max_request_body: 10485760
    redact_egress_default: false
    mappings_dir: ~/.config/crabwise/proxy_mappings
    mapping_strict_mode: false
    providers:
      openai:
        upstream_base_url: https://api.openai.com
        auth_mode: passthrough
        route_patterns:
          - /v1/chat/completions
          - /v1/responses
          - /v1/embeddings
        max_idle_conns: 10
        idle_conn_timeout: 90s

queue:
  capacity: 10000
  batch_size: 100
  flush_interval: 1s
  overflow: block_with_timeout
  block_timeout: 100ms

audit:
  retention_days: 30
  hash_algorithm: sha256
  raw_payload_enabled: false
  raw_payload_max_size: 1048576
  raw_payload_quota: 524288000
  raw_payload_gc_interval: 1h

commandments:
  file: ~/.config/crabwise/commandments.yaml

tool_registry:
  file: ~/.config/crabwise/tool_registry.yaml

cost:
  pricing:
    gpt-4o:      { input: 2.50, output: 10.00 }
    gpt-4o-mini: { input: 0.15, output: 0.60 }

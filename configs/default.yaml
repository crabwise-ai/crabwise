daemon:
  socket_path: ~/.local/share/crabwise/crabwise.sock
  db_path: ~/.local/share/crabwise/crabwise.db
  raw_payload_dir: ~/.local/share/crabwise/raw/
  log_level: info
  pid_file: ~/.local/share/crabwise/crabwise.pid

discovery:
  scan_interval: 10s
  process_signatures:
    - claude
    - codex
  log_paths:
    - ~/.claude/projects/
    - ~/.codex/sessions/

adapters:
  log_watcher:
    enabled: true
    poll_fallback_interval: 30s
  proxy:
    enabled: true
    listen: 127.0.0.1:9119
    # Used as fallback when request path doesn't match any provider's route_patterns.
    # In forward proxy mode, the provider is primarily resolved by CONNECT domain.
    default_provider: openai
    upstream_timeout: 30s
    stream_idle_timeout: 120s
    max_request_body: 10485760
    redact_egress_default: false
    ca_cert: ~/.local/share/crabwise/ca.crt
    ca_key: ~/.local/share/crabwise/ca.key
    mappings_dir: ~/.config/crabwise/proxy_mappings
    mapping_strict_mode: false
    providers:
      openai:
        upstream_base_url: https://api.openai.com
        auth_mode: passthrough
        route_patterns:
          - /v1/chat/completions
          - /v1/responses
          - /v1/embeddings
        max_idle_conns: 10
        idle_conn_timeout: 90s
  openclaw:
    enabled: false
    gateway_url: ws://127.0.0.1:18789
    api_token_env: OPENCLAW_API_TOKEN
    session_refresh_interval: 30s
    correlation_window: 3s

queue:
  capacity: 10000
  batch_size: 100
  flush_interval: 1s
  overflow: block_with_timeout
  block_timeout: 100ms

audit:
  retention_days: 30
  hash_algorithm: sha256
  raw_payload_enabled: false
  raw_payload_max_size: 1048576
  raw_payload_quota: 524288000
  raw_payload_gc_interval: 1h

commandments:
  file: ~/.config/crabwise/commandments.yaml

tool_registry:
  file: ~/.config/crabwise/tool_registry.yaml

cost:
  pricing:
    gpt-4o:      { input: 2.50, output: 10.00 }
    gpt-4o-mini: { input: 0.15, output: 0.60 }

service:
  agents:
    openclaw:
      systemd_unit: openclaw-gateway
      launchd_plist: com.openclaw.gateway

notifications:
  desktop:
    enabled: false
    min_interval: 10s
  webhook:
    enabled: false
    url: ""
    auth_header_env: ""
    format: ""  # "" (default JSON) or "discord"
    min_interval: 5s

otel:
  enabled: false
  endpoint: localhost:4318
  export_interval: 5s

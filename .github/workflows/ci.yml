name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
      - uses: golangci/golangci-lint-action@v9
        with:
          version: v2.10

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
      - run: go test -race -count=1 ./...

  benchmark-gate:
    runs-on: ubuntu-latest
    needs: [test]
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
      - run: bash scripts/ci/check_m3_bench.sh

  build:
    runs-on: ubuntu-latest
    needs: [lint, test, benchmark-gate]
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
      - run: make build

  npm-packaging:
    runs-on: ubuntu-latest
    needs: [lint, test, benchmark-gate]
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
      - uses: actions/setup-node@v5
        with:
          node-version: 20
      - name: Set npm dev version
        run: make npm-set-version VERSION=0.0.0-dev
      - name: Stage executable stubs for packaging verify
        run: mkdir -p npm/platform/darwin-x64/bin npm/platform/darwin-arm64/bin npm/platform/linux-x64/bin npm/platform/linux-arm64/bin && printf '#!/usr/bin/env bash\necho stub\n' > npm/platform/darwin-x64/bin/crabwise && printf '#!/usr/bin/env bash\necho stub\n' > npm/platform/darwin-arm64/bin/crabwise && printf '#!/usr/bin/env bash\necho stub\n' > npm/platform/linux-x64/bin/crabwise && printf '#!/usr/bin/env bash\necho stub\n' > npm/platform/linux-arm64/bin/crabwise && chmod +x npm/platform/darwin-x64/bin/crabwise npm/platform/darwin-arm64/bin/crabwise npm/platform/linux-x64/bin/crabwise npm/platform/linux-arm64/bin/crabwise
      - name: Validate npm packs
        run: make npm-pack
      - name: Smoke run npm launcher on linux-x64
        run: go build -o bin/crabwise ./cmd/crabwise && cp bin/crabwise npm/platform/linux-x64/bin/crabwise && chmod +x npm/platform/linux-x64/bin/crabwise && npm pack ./npm/platform/linux-x64 && npm pack ./npm/crabwise && tmp_dir="$(mktemp -d)" && npm install --prefix "$tmp_dir" "$GITHUB_WORKSPACE/crabwise-linux-x64-0.0.0-dev.tgz" "$GITHUB_WORKSPACE/crabwise-0.0.0-dev.tgz" && "$tmp_dir/node_modules/.bin/crabwise" version --plain

version: 2

builds:
  - main: ./cmd/crabwise
    binary: crabwise
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w
      - -X github.com/crabwise-ai/crabwise/internal/cli.Version={{.Version}}

archives:
  - format: tar.gz
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"

checksum:
  name_template: checksums.txt

release:
  header: |-
    **Crabwise** is a local-first daemon that monitors AI agent activity. It watches Claude Code and Codex CLI sessions, builds a hash-chained audit trail in SQLite, and lets you query or stream events in real time.

    ## What's in this release

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
